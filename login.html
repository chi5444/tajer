<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>تسجيل الدخول | تاجر</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0c0c0e;--ink2:#141416;--ink3:#1c1c1f;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --gold:#c8a96e;--gold-lt:#e2c98a;
  --cream:#f5f0e8;--white:#fff;--muted:#6b6b73;--soft:#9d9da5;
  --red:#e05252;--green:#52b788;
  --r12:12px;--r16:16px;
}
*,::before,::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Tajawal',sans-serif;
  background:var(--ink);color:var(--cream);
  min-height:100vh;display:grid;grid-template-columns:1fr 1fr;
}
/* ── LEFT PANEL (image) ── */
.panel-img{
  position:relative;overflow:hidden;
  background:var(--ink2);
  display:flex;align-items:center;justify-content:center;
}
.panel-img img{
  width:100%;height:100%;object-fit:cover;opacity:.5;
  mix-blend-mode:luminosity;
}
.panel-img-overlay{
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,0,0,.6) 0%,rgba(12,12,14,.3) 100%);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:48px;text-align:center;
}
.panel-logo{
  font-family:'Playfair Display',serif;
  font-size:48px;font-weight:900;
  color:var(--gold);text-shadow:0 0 40px rgba(200,169,110,.4);
  margin-bottom:16px;letter-spacing:2px;
}
.panel-logo em{color:var(--white);font-style:normal}
.panel-sub{
  font-size:16px;color:rgba(255,255,255,.6);
  line-height:1.7;max-width:300px;
}
.panel-tags{
  display:flex;gap:10px;margin-top:28px;flex-wrap:wrap;justify-content:center;
}
.panel-tag{
  background:rgba(200,169,110,.12);
  border:1px solid rgba(200,169,110,.25);
  color:var(--gold);border-radius:100px;
  padding:6px 16px;font-size:12px;font-weight:700;
}
/* ── RIGHT PANEL (form) ── */
.panel-form{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:clamp(32px,5vw,64px);
  background:var(--ink2);
}
.form-card{width:100%;max-width:420px}
.form-card-header{margin-bottom:32px}
.form-card-header h2{
  font-family:'Playfair Display',serif;
  font-size:28px;color:var(--white);margin-bottom:6px;
}
.form-card-header p{font-size:14px;color:var(--muted)}
/* tabs */
.tabs{
  display:flex;background:rgba(255,255,255,.04);
  border-radius:10px;padding:4px;margin-bottom:28px;
}
.tab{
  flex:1;padding:10px;text-align:center;
  border:none;background:none;color:var(--muted);
  font-family:'Tajawal',sans-serif;font-size:14px;
  font-weight:600;cursor:pointer;border-radius:8px;
  transition:all .2s;
}
.tab.active{background:var(--gold);color:var(--ink)}
/* field */
.field{margin-bottom:18px}
.field label{
  display:block;font-size:12px;font-weight:700;
  letter-spacing:.5px;text-transform:uppercase;
  color:var(--muted);margin-bottom:8px;
}
.field input{
  width:100%;background:rgba(255,255,255,.04);
  border:1px solid var(--border);border-radius:var(--r12);
  padding:13px 16px;color:var(--white);
  font-family:'Tajawal',sans-serif;font-size:15px;
  outline:none;transition:border-color .2s;
}
.field input:focus{border-color:var(--gold)}
.field input::placeholder{color:var(--muted)}
/* alert */
.alert{
  padding:11px 15px;border-radius:10px;
  font-size:13px;margin-bottom:16px;display:none;
}
.alert.e{background:rgba(224,82,82,.1);border:1px solid rgba(224,82,82,.3);color:#f99;display:block}
.alert.s{background:rgba(82,183,136,.1);border:1px solid rgba(82,183,136,.3);color:#9ef2c5;display:block}
/* submit */
.btn-submit{
  width:100%;background:var(--gold);color:var(--ink);
  border:none;border-radius:var(--r12);padding:14px;
  font-family:'Tajawal',sans-serif;font-size:16px;font-weight:800;
  cursor:pointer;transition:all .25s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-submit:hover{background:var(--gold-lt);transform:translateY(-2px);box-shadow:0 10px 30px rgba(200,169,110,.25)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}
.spin{
  width:18px;height:18px;border:2px solid rgba(0,0,0,.3);
  border-top-color:var(--ink);border-radius:50%;
  animation:sp .7s linear infinite;display:none;
}
.loading .spin{display:block}
.loading .lbl{display:none}
@keyframes sp{to{transform:rotate(360deg)}}
/* back */
.back{margin-top:24px;text-align:center}
.back a{color:var(--muted);font-size:13px;transition:color .2s}
.back a:hover{color:var(--gold)}
/* responsive */
@media(max-width:768px){
  body{grid-template-columns:1fr}
  .panel-img{display:none}
  .panel-form{padding:32px 20px}
}
</style>
</head>
<body>

<div class="panel-img">
  <img src="https://images.unsplash.com/photo-1441984904996-e0b6ba687e04?w=900&q=70" alt="">
  <div class="panel-img-overlay">
    <div class="panel-logo">تاجر<em>.</em></div>
    <p class="panel-sub">أفضل الملابس والهواتف والإلكترونيات في مكان واحد</p>
    <div class="panel-tags">
      <span class="panel-tag">👕 ملابس</span>
      <span class="panel-tag">📱 هواتف</span>
      <span class="panel-tag">💻 إلكترونيات</span>
      <span class="panel-tag">👟 أحذية</span>
    </div>
  </div>
</div>

<div class="panel-form">
  <div class="form-card">
    <div class="form-card-header">
      <h2>أهلاً بك</h2>
      <p>سجّل دخولك أو أنشئ حساباً جديداً</p>
    </div>

    <div class="tabs">
      <button class="tab active" id="t-login" onclick="sw('login')">تسجيل الدخول</button>
      <button class="tab" id="t-reg" onclick="sw('register')">حساب جديد</button>
    </div>

    <div id="alert-box" class="alert"></div>

    <!-- login -->
    <div id="f-login">
      <div class="field">
        <label>البريد الإلكتروني</label>
        <input type="email" id="l-email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input type="password" id="l-pass" placeholder="••••••••">
      </div>
      <button class="btn-submit" id="b-login" onclick="doLogin()">
        <div class="spin"></div><span class="lbl">دخول ←</span>
      </button>
    </div>

    <!-- register -->
    <div id="f-reg" style="display:none">
      <div class="field">
        <label>البريد الإلكتروني</label>
        <input type="email" id="r-email" placeholder="you@example.com">
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input type="password" id="r-pass" placeholder="٦ أحرف على الأقل">
      </div>
      <div class="field">
        <label>تأكيد كلمة المرور</label>
        <input type="password" id="r-conf" placeholder="أعد كتابة كلمة المرور">
      </div>
      <button class="btn-submit" id="b-reg" onclick="doRegister()">
        <div class="spin"></div><span class="lbl">إنشاء الحساب</span>
      </button>
    </div>

    <div class="back"><a href="/index.html">← العودة للمتجر</a></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/supabase.js"></script>
<script>
function sw(tab) {
  document.getElementById('t-login').classList.toggle('active', tab==='login');
  document.getElementById('t-reg').classList.toggle('active', tab==='register');
  document.getElementById('f-login').style.display = tab==='login'?'block':'none';
  document.getElementById('f-reg').style.display   = tab==='register'?'block':'none';
  clearAlert();
}
function showAlert(m, t='e') {
  const el = document.getElementById('alert-box');
  el.textContent = m; el.className = 'alert '+t;
}
function clearAlert() { document.getElementById('alert-box').className='alert'; }
function setLoad(id, v) {
  const b = document.getElementById(id);
  b.disabled = v; b.classList.toggle('loading', v);
}

async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  if (!email||!pass) return showAlert('الرجاء ملء جميع الحقول');
  setLoad('b-login', true);
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  setLoad('b-login', false);
  if (error) return showAlert('البريد أو كلمة المرور غير صحيحة');
  showAlert('تم الدخول! جاري التحويل...', 's');
  setTimeout(() => {
    window.location.href = data.user.email.startsWith('admin@') ? '/admin/' : '/index.html';
  }, 800);
}

async function doRegister() {
  const email = document.getElementById('r-email').value.trim();
  const pass  = document.getElementById('r-pass').value;
  const conf  = document.getElementById('r-conf').value;
  if (!email||!pass||!conf) return showAlert('الرجاء ملء جميع الحقول');
  if (pass.length < 6) return showAlert('كلمة المرور قصيرة جداً');
  if (pass !== conf)   return showAlert('كلمتا المرور غير متطابقتان');
  setLoad('b-reg', true);
  const { error } = await sb.auth.signUp({ email, password: pass });
  setLoad('b-reg', false);
  if (error) return showAlert('حدث خطأ: ' + error.message);
  showAlert('تم إنشاء الحساب! يمكنك الدخول الآن.', 's');
  setTimeout(() => sw('login'), 1500);
}

(async () => {
  const u = await getCurrentUser();
  if (u) window.location.href = u.email.startsWith('admin@') ? '/admin/' : '/index.html';
})();
</script>
</body>
</html>
