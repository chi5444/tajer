<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | تاجر</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep:    #06060c;
      --bg-card:    #0e0e1a;
      --border:     rgba(255,255,255,0.07);
      --accent:     #f59e0b;
      --accent2:    #ef4444;
      --text:       #f0f0f0;
      --text-muted: #6b7280;
      --text-soft:  #9ca3af;
      --radius:     14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    /* BG Orbs */
    .bg-orbs { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0.15;
    }
    .orb-1 { width: 500px; height: 500px; background: var(--accent); top: -100px; right: -100px; animation: float 8s ease-in-out infinite; }
    .orb-2 { width: 400px; height: 400px; background: #8b5cf6; bottom: -100px; left: -100px; animation: float 10s ease-in-out infinite reverse; }
    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(30px, 20px); }
    }
    /* CARD */
    .login-card {
      position: relative; z-index: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: clamp(32px, 5vw, 56px);
      width: 100%; max-width: 440px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.5);
    }
    .login-card::before {
      content: '';
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 60%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }
    .card-logo {
      text-align: center; margin-bottom: 32px;
    }
    .card-logo a {
      font-family: 'Orbitron', sans-serif;
      font-size: 32px; font-weight: 900;
      color: var(--accent);
      text-shadow: 0 0 30px rgba(245,158,11,0.5);
      text-decoration: none; letter-spacing: 3px;
    }
    .card-logo span { color: var(--text); }
    .card-logo p { color: var(--text-muted); font-size: 14px; margin-top: 6px; }
    /* TABS */
    .auth-tabs {
      display: flex; background: rgba(255,255,255,0.04);
      border-radius: 10px; padding: 4px;
      margin-bottom: 28px;
    }
    .auth-tab {
      flex: 1; padding: 10px; text-align: center;
      border: none; background: none; color: var(--text-muted);
      font-family: 'Tajawal', sans-serif; font-size: 14px;
      font-weight: 600; cursor: pointer; border-radius: 8px;
      transition: all .2s;
    }
    .auth-tab.active {
      background: var(--accent); color: #000;
    }
    /* FORM */
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--text-soft); margin-bottom: 8px;
    }
    .form-input {
      width: 100%; background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius); padding: 13px 16px;
      color: var(--text); font-family: 'Tajawal', sans-serif;
      font-size: 15px; outline: none; transition: border-color .2s;
    }
    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--text-muted); }
    .btn-submit {
      width: 100%; background: var(--accent); color: #000;
      border: none; border-radius: var(--radius);
      padding: 14px; font-family: 'Tajawal', sans-serif;
      font-size: 16px; font-weight: 800; cursor: pointer;
      transition: all .25s; margin-top: 6px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-submit:hover { background: #d97706; transform: translateY(-2px); box-shadow: 0 10px 30px rgba(245,158,11,0.3); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-submit .spinner {
      width: 18px; height: 18px; border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000; border-radius: 50%;
      animation: spin .7s linear infinite; display: none;
    }
    .btn-submit.loading .spinner { display: block; }
    .btn-submit.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    /* ALERT */
    .alert {
      padding: 12px 16px; border-radius: 10px;
      font-size: 14px; margin-bottom: 18px; display: none;
    }
    .alert.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .alert.success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
    .alert.show { display: block; }
    /* DIVIDER */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0; color: var(--text-muted); font-size: 12px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    /* BACK */
    .back-link {
      text-align: center; margin-top: 20px;
    }
    .back-link a {
      color: var(--text-muted); font-size: 13px; text-decoration: none;
      transition: color .2s;
    }
    .back-link a:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="login-card">
    <div class="card-logo">
      <a href="/index.html">TAJER<span>.</span></a>
      <p>المتجر الرقمي الأول</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">تسجيل الدخول</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">إنشاء حساب</button>
    </div>

    <div id="alert-box" class="alert"></div>

    <!-- Login Form -->
    <div id="form-login">
      <div class="form-group">
        <label class="form-label">البريد الإلكتروني</label>
        <input type="email" id="login-email" class="form-input" placeholder="example@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">كلمة المرور</label>
        <input type="password" id="login-password" class="form-input" placeholder="••••••••" required>
      </div>
      <button class="btn-submit" id="btn-login" onclick="handleLogin()">
        <div class="spinner"></div>
        <span class="btn-text">دخول ←</span>
      </button>
    </div>

    <!-- Register Form -->
    <div id="form-register" style="display:none">
      <div class="form-group">
        <label class="form-label">البريد الإلكتروني</label>
        <input type="email" id="reg-email" class="form-input" placeholder="example@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">كلمة المرور</label>
        <input type="password" id="reg-password" class="form-input" placeholder="على الأقل 6 أحرف" required>
      </div>
      <div class="form-group">
        <label class="form-label">تأكيد كلمة المرور</label>
        <input type="password" id="reg-confirm" class="form-input" placeholder="أعد كتابة كلمة المرور" required>
      </div>
      <button class="btn-submit" id="btn-register" onclick="handleRegister()">
        <div class="spinner"></div>
        <span class="btn-text">إنشاء الحساب</span>
      </button>
    </div>

    <div class="back-link">
      <a href="/index.html">← العودة للمتجر</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/js/supabase.js"></script>
  <script>
    function switchTab(tab) {
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none';
      hideAlert();
    }

    function showAlert(msg, type = 'error') {
      const el = document.getElementById('alert-box');
      el.textContent = msg;
      el.className = `alert ${type} show`;
    }
    function hideAlert() {
      document.getElementById('alert-box').className = 'alert';
    }

    function setLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.classList.toggle('loading', loading);
    }

    async function handleLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email || !password) return showAlert('الرجاء ملء جميع الحقول');

      setLoading('btn-login', true);
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      setLoading('btn-login', false);

      if (error) return showAlert('خطأ: ' + (error.message === 'Invalid login credentials' ? 'البريد أو كلمة المرور غير صحيحة' : error.message));

      showAlert('تم تسجيل الدخول! جاري التحويل...', 'success');

      // Redirect: admin goes to panel, others to home
      const user = data.user;
      setTimeout(() => {
        if (user.email && user.email.startsWith('admin@')) {
          window.location.href = '/admin/';
        } else {
          window.location.href = '/index.html';
        }
      }, 1000);
    }

    async function handleRegister() {
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirm = document.getElementById('reg-confirm').value;

      if (!email || !password || !confirm) return showAlert('الرجاء ملء جميع الحقول');
      if (password.length < 6) return showAlert('كلمة المرور يجب أن تكون 6 أحرف على الأقل');
      if (password !== confirm) return showAlert('كلمتا المرور غير متطابقتان');

      setLoading('btn-register', true);
      const { error } = await sb.auth.signUp({ email, password });
      setLoading('btn-register', false);

      if (error) return showAlert('خطأ: ' + error.message);
      showAlert('تم إنشاء الحساب بنجاح! يمكنك الدخول الآن.', 'success');
      setTimeout(() => switchTab('login'), 1500);
    }

    // Auto redirect if already logged in
    (async () => {
      const user = await getCurrentUser();
      if (user) {
        if (user.email && user.email.startsWith('admin@')) window.location.href = '/admin/';
        else window.location.href = '/index.html';
      }
    })();
  </script>
</body>
</html>
